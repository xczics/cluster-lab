version: "3.9"

networks:
  cluster-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  home_shared:
  scratch_shared:
  db_data:

services:
  slurmctl:
    hostname: slurmctl
    container_name: slurmctl
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: cluster-lab:latest
    ports:
      - "6817:6817"   # slurmctld
      - "6818:6818"   # slurmdbd
      - "6819:6819"   # slurmrestd
      - "5050:5000"   # Flask billing
    volumes:
      - home_shared:/home
      - scratch_shared:/scratch
      - db_data:/var/lib/mysql
      - ../config/slurm/slurm.conf:/etc/slurm/slurm.conf:ro
      - ../config/slurm/slurmdbd.conf:/etc/slurm/slurmdbd.conf:ro
      - ../config/slurm/cgroup.conf:/etc/slurm/cgroup.conf:ro
      - ../config/nfs/exports:/etc/exports:ro
      - ../scripts/billing:/opt/billing:ro
    environment:
      - CLUSTER_ROLE=controller
      - SLURM_CLUSTER_NAME=cluster-lab
    networks:
      cluster-net:
        ipv4_address: 172.20.0.10
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_NICE

  node01:
    hostname: node01
    container_name: node01
    image: cluster-lab:latest
    volumes:
      - home_shared:/home
      - scratch_shared:/scratch
      - ../config/slurm/slurm.conf:/etc/slurm/slurm.conf:ro
      - ../config/slurm/cgroup.conf:/etc/slurm/cgroup.conf:ro
    environment:
      - CLUSTER_ROLE=worker
    depends_on:
      - slurmctl
    networks:
      cluster-net:
        ipv4_address: 172.20.0.11
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_NICE

  node02:
    hostname: node02
    container_name: node02
    image: cluster-lab:latest
    volumes:
      - home_shared:/home
      - scratch_shared:/scratch
      - ../config/slurm/slurm.conf:/etc/slurm/slurm.conf:ro
      - ../config/slurm/cgroup.conf:/etc/slurm/cgroup.conf:ro
      - ../config/slurm/gres.conf:/etc/slurm/gres.conf:ro
    environment:
      - CLUSTER_ROLE=worker
    depends_on:
      - slurmctl
    networks:
      cluster-net:
        ipv4_address: 172.20.0.12
    privileged: true
    cap_add:
      - SYS_ADMIN
      - SYS_NICE

  login:
    hostname: login
    container_name: login
    image: cluster-lab:latest
    ports:
      - "2222:22"       # SSH for user login
    volumes:
      - home_shared:/home
      - ../config/slurm/slurm.conf:/etc/slurm/slurm.conf:ro
      - ../config/slurm/cgroup.conf:/etc/slurm/cgroup.conf:ro
    environment:
      - CLUSTER_ROLE=login
    depends_on:
      - slurmctl
    networks:
      cluster-net:
        ipv4_address: 172.20.0.13
    privileged: true
    cap_add:
      - SYS_ADMIN
