# Cluster-Lab Slurm Configuration
# Generated by agent-yuan for zircon / cluster-lab project

# ── 集群名称 ──
ClusterName=cluster-lab

# ── 控制节点 ──
SlurmctldHost=slurmctl(172.20.0.10)

# ── 认证与安全 ──
AuthType=auth/none
CryptoType=crypto/none
SlurmUser=root

# ── 调度 ──
SchedulerType=sched/backfill
SchedulerParameters=default_queue_depth=100
SelectType=select/cons_tres
SelectTypeParameters=CR_Core

# ── 通信 ──
SlurmctldPort=6817
SlurmdPort=6818
SlurmdTimeout=60
SlurmctldTimeout=120
InactiveLimit=0
MinJobAge=300
KillWait=30
Waittime=0

# ── 日志 ──
SlurmctldDebug=debug
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=debug
SlurmdLogFile=/var/log/slurm/slurmd.log
DebugFlags=Steps

# ── 数据库（会计） ──
AccountingStorageType=accounting_storage/slurmdbd
AccountingStorageHost=localhost
AccountingStoragePort=6819
AccountingStorageUser=slurm
AccountingStoragePass=slurm
# StorageLoc is set in slurmdbd.conf

# ── 作业记账 ──
JobAcctGatherType=jobacct_gather/linux
JobAcctGatherFrequency=30

# ── 节能 ──
# PowerSlurmdbdOff removed in Slurm 24.11

# ── 节点定义 ──
# 管理节点（不用于计算，但有 slurmd 以保持注册）
NodeName=slurmctl CPUs=1 RealMemory=1024 Sockets=1 CoresPerSocket=1 ThreadsPerCore=1 State=DOWN

# 计算节点
NodeName=node01 CPUs=2 RealMemory=2048 Sockets=1 CoresPerSocket=2 ThreadsPerCore=1 State=UNKNOWN
NodeName=node02 CPUs=2 RealMemory=2048 Sockets=1 CoresPerSocket=2 ThreadsPerCore=1 State=UNKNOWN

# ── 分区定义 ──
# 默认分区，包含所有计算节点
#DUPLICATE: PartitionName=normal Nodes=node01,node02 Default=YES MaxTime=INFINITE State=UP

# 管理分区（仅管理节点，用于管理作业）
#REMOVED: PartitionName=admin Nodes=slurmctl Default=NO MaxTime=INFINITE State=UP

# 专用分区
PartitionName=debug Nodes=node01 MaxTime=00:30:00 Default=NO State=UP

# ── 任务插件 ──
# TaskPlugin=task/cgroup (disabled, no cgroup v2 support)
ProctrackType=proctrack/linuxproc

# ── GRES (Generic Resource Scheduling — GPU模拟) ──
#Include gres.conf

# ── QoS配置 ──
# QoS定义通过sacctmgr创建 (见 scripts/setup_qos.sh)
# 更新分区以支持多个QoS
PartitionName=normal Nodes=node01,node02 Default=YES MaxTime=7-00:00:00 State=UP QOS=high,normal,low

# ── 拓扑 ──
#TopologyPlugin=topology/tree
TreeWidth=65533

# ── 返回码 ──
ReturnToService=2
