# Slurm QoS Configuration (Cluster-Lab)
# Include in slurm.conf via: include qos_partitions.conf
# Activate with: sacctmgr add qos ... (see setup_qos.sh)

# QoS Definitions (for reference — actual QoS are created via sacctmgr)
# ─────────────────────────────────────────────────────────
# QoS Name    Priority    MaxWall            MaxJobs    Description
# ─────────────────────────────────────────────────────────
# high        1000        1-00:00:00 (1d)    10         Privileged users
# normal      500         2-00:00:00 (2d)    20         Standard jobs
# low         100         7-00:00:00 (7d)    50         Best-effort / batch
# ─────────────────────────────────────────────────────────

# Partition configuration (QoS association)
# ── normal partition (default) ──
# PartitionName=normal Nodes=node[01-02] Default=YES
#   MaxTime=7-00:00:00 State=UP
#   QOS=high,normal,low
#   DefaultQOS=normal
