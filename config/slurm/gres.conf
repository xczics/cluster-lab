# Slurm GRES (Generic Resource Scheduling) Configuration
# Simulates GPU devices for job scheduling testing
# 
# Each compute node gets 4 "fake GPU" devices
# The actual device files (/dev/fake_gpu*) are created in entrypoint.sh
#
# To test GPU allocation:
#   srun --gres=gpu:1 nvidia-smi
#   -> Reports "nvidia-smi not found" (expected for fake GPUs)
#   srun --gres=gpu:1 ls /dev/fake_gpu*
#   -> Shows allocated fake GPU device
#
# Slurm will allocate the GRES but jobs must handle
# the device files being non-functional (simulated only)

# slurmctl (controller — no compute GRES)
NodeName=slurmctl Name=gpu File=/dev/fake_gpu[0-3] Count=0

# node01 — 4 simulated GPUs
NodeName=node01 Name=gpu File=/dev/fake_gpu[0-3] Count=4

# node02 — 4 simulated GPUs
NodeName=node02 Name=gpu File=/dev/fake_gpu[0-3] Count=4
